services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-socket-proxy
    environment:
      CONTAINERS: 1
      EXEC: 0
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - proxy-net
    restart: unless-stopped

  docker-log-adapter:
    build: .
    container_name: docker-log-adapter
    depends_on:
      - socket-proxy
    ports:
      - "9090:9090"
    environment:
      - PORT=9090
      - LABEL_FILTER=${LABEL_FILTER:-publishLog=true}
      - RESCAN_MS=${RESCAN_MS:-5000}
      - DOCKER_HOST=tcp://socket-proxy:2375
    networks:
      - proxy-net
      - client-net
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9090"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  proxy-net:
    internal: true
  client-net:
